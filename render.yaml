databases:
  - name: bizintel-db
    databaseName: bizintel
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: bizintel-backend
    runtime: docker
    repo: https://github.com/Alliance-D/bizintel-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bizintel-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://bizintel-frontend.onrender.com

  - type: web
    name: bizintel-frontend
    runtime: node
    repo: https://github.com/Alliance-D/bizintel-frontend
    plan: free
    # NODE_OPTIONS is set inline rather than via envVars below: Render does
    # not reliably apply service-level env vars during the build step for
    # native runtimes, only at runtime, so a value that only exists in
    # envVars can silently never reach npm/next build at all. next.config.js
    # also caps build parallelism (experimental.cpus/workerThreads), which
    # matters more than the heap cap here: next build's heaviest phase runs
    # through SWC, a native Rust compiler that isn't V8-heap-bound, so
    # --max-old-space-size alone does not constrain it, and any parallel
    # build workers each get their own heap on top of whatever cap is set.
    buildCommand: NODE_OPTIONS=--max-old-space-size=460 npm ci --no-audit --no-fund && NODE_OPTIONS=--max-old-space-size=460 npm run build
    startCommand: npm run start
    envVars:
      # NEXT_PUBLIC_ vars are baked into the client bundle at build time, so
      # this has to be a plain value, not a cross-service reference. Render
      # assigns https://<service-name>.onrender.com by default, matching the
      # name above; update this if you set a custom domain.
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://bizintel-backend.onrender.com
