databases:
  - name: bizintel-db
    databaseName: bizintel
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: bizintel-backend
    runtime: docker
    repo: https://github.com/Alliance-D/bizintel-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bizintel-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://bizintel-frontend.onrender.com

  # The frontend is no longer built on Render at all. Its free build
  # container (512MB) repeatedly got SIGKILLed partway through `next build`
  # regardless of memory tuning, Node version, or build parallelism, none of
  # which moved the failure point. The image is now built in GitHub Actions
  # (.github/workflows/docker-publish.yml in the frontend repo) and pushed to
  # GHCR; Render just pulls and runs it. Running a built app needs far less
  # memory than compiling one. This also means NEXT_PUBLIC_API_BASE_URL is
  # baked in at build time by that workflow, not set here; changing it means
  # editing the workflow and pushing, not editing this file.
  - type: web
    name: bizintel-frontend
    runtime: image
    plan: free
    image:
      url: ghcr.io/alliance-d/bizintel-frontend:latest
