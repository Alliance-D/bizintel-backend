databases:
  - name: bizintel-db
    databaseName: bizintel
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: bizintel-backend
    runtime: docker
    repo: https://github.com/Alliance-D/bizintel-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bizintel-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://bizintel-frontend.onrender.com

  # Testing runtime: node (no Docker at all) to isolate whether the 502s
  # are Docker-specific to this account/service, or something else
  # entirely. The one thing never actually retested since the real build
  # blocker (a corrupted package-lock.json, unrelated to Docker) was fixed:
  # every runtime: node attempt before now happened while that lockfile bug
  # was still live, so it never got a fair test. runtime: image (a
  # pre-built GHCR image) and runtime: docker (building here) have both
  # produced a container that starts cleanly every time, with Render's
  # dashboard reporting it live, yet 502s or Not Found on every single
  # request from outside. If this also fails the same way, it rules out
  # Docker as the variable entirely.
  - type: web
    name: bizintel-frontend
    runtime: node
    repo: https://github.com/Alliance-D/bizintel-frontend
    plan: free
    buildCommand: npm ci --no-audit --no-fund && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://bizintel-backend.onrender.com
