databases:
  - name: bizintel-db
    databaseName: bizintel
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: bizintel-backend
    runtime: docker
    repo: https://github.com/Alliance-D/bizintel-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bizintel-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://bizintel-frontend.onrender.com

  # Frontend: native Node build (Next.js), no Docker.
  - type: web
    name: bizintel-frontend
    runtime: node
    repo: https://github.com/Alliance-D/bizintel-frontend
    plan: free
    buildCommand: npm ci --no-audit --no-fund && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://bizintel-backend-atgv.onrender.com
