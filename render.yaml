databases:
  - name: bizintel-db
    databaseName: bizintel
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: bizintel-backend
    runtime: docker
    repo: https://github.com/Alliance-D/bizintel-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bizintel-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://bizintel-frontend.onrender.com

  # Back to building directly on Render (runtime: docker), matching the
  # backend. This was originally moved to a pre-built image from GitHub
  # Actions because of what looked like a memory-related build failure, but
  # the real cause turned out to be a corrupted package-lock.json (fixed),
  # not memory. Once that was fixed, runtime: image started returning a
  # persistent "Not Found" from Render's edge for every request, even right
  # after a full delete-and-recreate of the service, with the container
  # itself starting cleanly every time and Render's own dashboard reporting
  # it live, meaning traffic was never reaching the origin at all. That
  # points at a platform-side routing issue specific to runtime: image on
  # this account, not anything fixable from this repo. runtime: docker is
  # Render's more established path and has had no such issues for the
  # backend, so the frontend uses it too now that the actual build blocker
  # is gone.
  - type: web
    name: bizintel-frontend
    runtime: docker
    repo: https://github.com/Alliance-D/bizintel-frontend
    dockerfilePath: ./Dockerfile.production
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      # Render passes service env vars through as Docker build args
      # automatically for runtime: docker services, which is what
      # Dockerfile.production's ARG NEXT_PUBLIC_API_BASE_URL picks up.
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://bizintel-backend.onrender.com
